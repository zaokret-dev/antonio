<style>
  :root {
    --blue: #0C71C3;
    --lightblue: #0099e5;
    --dark: #263954;
    --white: #ffffff;
    --bg-light: #f7f7f7;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; width: 100%; }
  body { font-family: 'Open Sans', sans-serif; font-size: 15px; line-height: 1.7; color: #333; background: #fff; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    height: 56px;
  }
  .nav-logo { color: #fff; text-decoration: none; font-weight: 700; font-size: 16px; white-space: nowrap; }
  .nav-links { display: flex; align-items: center; gap: 24px; list-style: none; margin: 0; padding: 0; }
  .nav-links a { color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .nav-links a:hover { color: #0099e5; }
  .nav-links .btn-book { background: #0099e5; color: #fff; padding: 8px 18px; border-radius: 3px; font-weight: 700; }
  .nav-links .btn-book:hover { background: #007bbf; color: #fff; }
  .nav-hamburger { display: none; background: none; border: none; color: #fff; font-size: 26px; cursor: pointer; }

  @media (max-width: 1000px) {
    nav { flex-wrap: wrap; padding: 0 20px; height: auto; min-height: 56px; }
    .nav-links { gap: 14px; }
    .nav-links a { font-size: 11px; letter-spacing: 1px; }
  }
  @media (max-width: 768px) {
    .nav-links { display: none; }
    .nav-hamburger { display: block; }
    nav { position: fixed; flex-wrap: nowrap; }
  }
  nav.nav-mobile-open .nav-links {
    display: flex !important;
    flex-direction: column;
    position: absolute;
    top: 56px; left: 0; right: 0;
    background: rgba(0,0,0,0.95);
    padding: 20px 32px;
    gap: 16px;
    z-index: 999;
  }

  /* HERO */
  .hero { padding-top: 56px; position: relative; min-height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; z-index: 0; }
  .hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 1; }
  .hero-inner { position: relative; z-index: 2; padding: 40px 20px; max-width: 800px; }
  .hero h1 { font-family: 'Nunito', sans-serif; font-size: 52px; color: #fff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .hero p { color: rgba(255,255,255,0.9); font-size: 17px; }

  /* GALLERY GRID */
  .gallery-section { padding: 60px 20px 90px; max-width: 1300px; margin: 0 auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    background: #eee;
  }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.35s ease;
  }
  .gallery-item:hover img { transform: scale(1.08); }

  @media (max-width: 900px) {
    .gallery-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .gallery-section { padding: 40px 16px 60px; }
    .hero h1 { font-size: 32px; }
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 4px;
  }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    background: none;
    border: none;
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    line-height: 1;
    z-index: 2001;
  }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 26px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2001;
  }
  .lightbox-nav:hover { background: rgba(0,153,229,0.85); }
  .lightbox-nav.prev { left: 16px; }
  .lightbox-nav.next { right: 16px; }

  /* FOOTER */
  footer { background: var(--dark); color: rgba(255,255,255,0.7); text-align: center; padding: 30px 20px; font-size: 14px; }
  footer a { color: var(--lightblue); text-decoration: none; }
</style>

<script>
  function toggleMenu() {
    document.querySelector('nav').classList.toggle('nav-mobile-open');
  }

  const galleryImgs = Array.from(document.querySelectorAll('#galleryGrid img')).map(img => ({ src: img.getAttribute('src'), alt: img.getAttribute('alt') }));
  let currentLightbox = 0;
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');

  function openLightbox(index) {
    currentLightbox = index;
    updateLightbox();
    lightbox.classList.add('open');
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
  }
  function navLightbox(dir) {
    currentLightbox = (currentLightbox + dir + galleryImgs.length) % galleryImgs.length;
    updateLightbox();
  }
  function updateLightbox() {
    const item = galleryImgs[currentLightbox];
    lightboxImg.src = item.src;
    lightboxImg.alt = item.alt;
  }
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
  });
</script>
